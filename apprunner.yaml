version: 1.0
runtime: nodejs22

build:
  commands:
    build:
      - npm ci --omit=dev

run:
  command: node src/server.js
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    # The following are set as App Runner environment variables in the AWS console
    # (or via AWS Secrets Manager) — do NOT hardcode secrets here:
    #   MONGO_URI
    #   GOOGLE_CLIENT_ID
    #   GOOGLE_CLIENT_SECRET
    #   GOOGLE_CALLBACK_URL   (set to your App Runner / custom domain URL)
    #   SESSION_SECRET
