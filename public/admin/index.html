<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership Admin</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
<header>
  <h1>Membership Admin</h1>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
</header>
<nav>
  <a href="/admin" class="active">Members</a>
  <div class="nav-dropdown">
    <a href="/admin/satellite-groups">Satellite Groups</a>
    <div class="nav-dropdown-menu" id="sat-nav"></div>
  </div>
  <a href="/admin/mailing-active">Active Mailing List</a>
</nav>

<div class="stats">
  <div class="stat-card" onclick="filterByCard('all')" style="cursor:pointer"><div class="label">Total Members</div><div class="value" id="stat-total">—</div></div>
  <div class="stat-card" onclick="filterByCard('active')" style="cursor:pointer"><div class="label">Active (not expired)</div><div class="value" id="stat-active">—</div></div>
  <div class="stat-card" onclick="filterByCard('recurring')" style="cursor:pointer"><div class="label">Recurring</div><div class="value" id="stat-recurring">—</div></div>
  <div class="stat-card" onclick="filterByCard('membership')" style="cursor:pointer"><div class="label">Membership List</div><div class="value" id="stat-membership">—</div></div>
  <div class="stat-card" onclick="filterByCard('mailing')" style="cursor:pointer"><div class="label">Mailing List</div><div class="value" id="stat-mailing">—</div></div>
  <div class="stat-card" onclick="filterByCard('email')" style="cursor:pointer"><div class="label">Email News</div><div class="value" id="stat-email-news">—</div></div>
</div>

<div class="toolbar">
  <select id="filter-active">
    <option value="">All members</option>
    <option value="true" selected>Active (not expired)</option>
    <option value="false">Expired only</option>
  </select>
  <select id="filter-recurring">
    <option value="">All members</option>
    <option value="true">Recurring only</option>
    <option value="false">Non-recurring only</option>
  </select>
  <select id="filter-membership">
    <option value="">Any membership list</option>
    <option value="true">On membership list</option>
    <option value="false">Not on membership list</option>
  </select>
  <select id="filter-mailing">
    <option value="">Any mailing list</option>
    <option value="true">On mailing list</option>
    <option value="false">Not on mailing list</option>
  </select>
  <button onclick="applyFilters()">Filter</button>
  <button onclick="openCreateModal()" style="margin-left:auto">+ Add Member</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="sortable" onclick="setSort('lastName')">Last Name</th>
        <th class="sortable" onclick="setSort('firstName')">First Name</th>
        <th class="sortable" onclick="setSort('emailAddress')">Email</th>
        <th>Primary Phone</th>
        <th class="sortable" onclick="setSort('city')">City</th>
        <th class="sortable" onclick="setSort('state')">State</th>
        <th class="sortable" onclick="setSort('recurringMember')">Recurring</th>
        <th class="sortable" onclick="setSort('renewalDate')">Renewal Date</th>
        <th>Mbr List</th><th>Mail List</th><th>Email News</th><th>Notes</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="member-tbody"></tbody>
  </table>
</div>

<div class="pagination">
  <button id="btn-prev" onclick="goPage(-1)">&#8592; Prev</button>
  <span id="page-info"></span>
  <button id="btn-next" onclick="goPage(1)">Next &#8594;</button>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2 id="modal-title">Add Member</h2>
    <form id="member-form" onsubmit="submitForm(event)">
      <input type="hidden" id="form-id" />
      <div class="form-grid">
        <label><span>First Name *</span><input type="text" id="form-firstName" required /></label>
        <label><span>Last Name *</span><input type="text" id="form-lastName" required /></label>
        <label class="span2"><span>Address Line 1</span><input type="text" id="form-addressLine1" /></label>
        <label class="span2"><span>Address Line 2</span><input type="text" id="form-addressLine2" /></label>
        <label><span>City</span><input type="text" id="form-city" /></label>
        <label><span>State</span><input type="text" id="form-state" /></label>
        <label><span>Postal / ZIP</span><input type="text" id="form-postalZip" /></label>
        <label><span>Satellite Home</span><input type="text" id="form-satelliteHome" /></label>
        <label><span>Primary Phone</span><input type="text" id="form-primaryPhone" /></label>
        <label><span>Secondary Phone</span><input type="text" id="form-secondaryPhone" /></label>
        <label><span>Tertiary Phone</span><input type="text" id="form-tertiaryPhone" /></label>
        <label><span>Email Address</span><input type="email" id="form-emailAddress" /></label>
        <label><span>Renewal Date</span><input type="date" id="form-renewalDate" /></label>
        <div></div>
        <div class="span2">
          <div class="checks">
            <label><input type="checkbox" id="form-recurringMember" /><span>Recurring Member</span></label>
            <label><input type="checkbox" id="form-membership_list" /><span>Membership List</span></label>
            <label><input type="checkbox" id="form-mailing_list" /><span>Mailing List</span></label>
            <label><input type="checkbox" id="form-email_news" /><span>Email News</span></label>
            <label><input type="checkbox" id="form-hide_email" /><span>Hide Email</span></label>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  let currentPage = 1;
  const LIMIT = 20;
  let currentFilters = { renewalDate_gte: 'today' };
  let sortField = 'lastName';
  let sortDir   = 1;

  function filterByCard(type) {
    currentFilters = {};
    if (type === 'all') {
      document.getElementById('filter-active').value = '';
    } else if (type === 'active') {
      currentFilters.renewalDate_gte = 'today';
      document.getElementById('filter-active').value = 'true';
    } else if (type === 'recurring') {
      currentFilters.renewalDate_gte = 'today';
      currentFilters.recurringMember = 'true';
      document.getElementById('filter-active').value = 'true';
      document.getElementById('filter-recurring').value = 'true';
    } else if (type === 'membership') {
      currentFilters.renewalDate_gte = 'today';
      currentFilters.membership_list = 'true';
      document.getElementById('filter-active').value = 'true';
      document.getElementById('filter-membership').value = 'true';
    } else if (type === 'mailing') {
      currentFilters.renewalDate_gte = 'today';
      currentFilters.mailing_list = 'true';
      document.getElementById('filter-active').value = 'true';
      document.getElementById('filter-mailing').value = 'true';
    } else if (type === 'email') {
      currentFilters.renewalDate_gte = 'today';
      currentFilters.email_news = 'true';
      document.getElementById('filter-active').value = 'true';
    }
    document.getElementById('filter-recurring').value = '';
    document.getElementById('filter-membership').value = '';
    document.getElementById('filter-mailing').value = '';
    currentPage = 1;
    loadMembers();
  }

  async function loadStats() {
    const res = await fetch('/api/members/stats');
    const d = await res.json();
    document.getElementById('stat-total').textContent      = d.total;
    document.getElementById('stat-active').textContent     = d.activeMembers;
    document.getElementById('stat-recurring').textContent  = d.recurring;
    document.getElementById('stat-membership').textContent = d.membershipList;
    document.getElementById('stat-mailing').textContent    = d.mailingList;
    document.getElementById('stat-email-news').textContent = d.emailNews;
  }

  function setSort(field) {
    if (sortField === field) { sortDir = sortDir === 1 ? -1 : 1; }
    else { sortField = field; sortDir = 1; }
    currentPage = 1;
    updateSortHeaders();
    loadMembers();
  }

  function updateSortHeaders() {
    document.querySelectorAll('th.sortable').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
      const field = th.getAttribute('onclick').replace("setSort('","").replace("')","");
      if (field === sortField) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    });
  }

  async function loadMembers() {
    const params = new URLSearchParams({ page: currentPage, limit: LIMIT, sortField, sortDir, ...currentFilters });
    const res = await fetch('/api/members?' + params);
    const data = await res.json();
    const tbody = document.getElementById('member-tbody');
    const bool = (v) => v ? '<span class="check">&#10003;</span>' : '<span class="cross">—</span>';
    tbody.innerHTML = data.members.map(m => `
      <tr>
        <td>${esc(m.lastName)}</td>
        <td>${esc(m.firstName)}</td>
        <td>${esc(m.emailAddress)}</td>
        <td>${esc(m.primaryPhone)}</td>
        <td>${esc(m.city)}</td>
        <td>${esc(m.state)}</td>
        <td>${bool(m.recurringMember)}</td>
        <td>${m.renewalDate ? new Date(m.renewalDate).toLocaleDateString() : '—'}</td>
        <td>${bool(m.membership_list)}</td>
        <td>${bool(m.mailing_list)}</td>
        <td>${bool(m.email_news)}</td>
        <td><button class="notes-link" id="notes-btn-${m._id}" onclick="openNotes('${m._id}', '${esc(m.firstName)} ${esc(m.lastName)}')">Notes</button></td>
        <td class="actions">
          <button onclick="openEditModal(${JSON.stringify(m).replaceAll('"', '&quot;')})">Edit</button>
          <button class="del" onclick="deleteMember('${m._id}', '${esc(m.firstName)} ${esc(m.lastName)}')">Delete</button>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="13" style="text-align:center;color:#999;padding:1.5rem">No members found</td></tr>';

    const totalPages = Math.ceil(data.total / LIMIT) || 1;
    document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages} (${data.total} total)`;
    document.getElementById('btn-prev').disabled = currentPage <= 1;
    document.getElementById('btn-next').disabled = currentPage >= totalPages;

    // Update note button labels
    const ids = data.members.map(m => m._id);
    if (ids.length) {
      const cRes = await fetch('/api/notes/counts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      const counts = await cRes.json();
      ids.forEach(id => {
        const btn = document.getElementById('notes-btn-' + id);
        if (btn) btn.textContent = counts[id] ? 'Notes' : 'Add Note';
      });
    }
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function applyFilters() {
    currentFilters = {};
    const a  = document.getElementById('filter-active').value;
    const r  = document.getElementById('filter-recurring').value;
    const m  = document.getElementById('filter-membership').value;
    const ml = document.getElementById('filter-mailing').value;
    if (a  === 'true')  currentFilters.renewalDate_gte = 'today';
    if (a  === 'false') currentFilters.renewalDate_lt  = 'today';
    if (r  !== '') currentFilters.recurringMember = r;
    if (m  !== '') currentFilters.membership_list  = m;
    if (ml !== '') currentFilters.mailing_list     = ml;
    currentPage = 1;
    loadMembers();
  }

  function goPage(delta) { currentPage += delta; loadMembers(); }

  const TEXT_FIELDS = ['firstName','lastName','addressLine1','addressLine2','city','state',
    'postalZip','satelliteHome','primaryPhone','secondaryPhone','tertiaryPhone'];
  const CHECK_FIELDS = ['recurringMember','membership_list','mailing_list','email_news','hide_email'];

  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'Add Member';
    document.getElementById('member-form').reset();
    document.getElementById('form-id').value = '';
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function openEditModal(m) {
    document.getElementById('modal-title').textContent = 'Edit Member';
    document.getElementById('form-id').value = m._id;
    TEXT_FIELDS.forEach(f => { document.getElementById('form-' + f).value = m[f] ?? ''; });
    document.getElementById('form-emailAddress').value = m.emailAddress ?? '';
    document.getElementById('form-renewalDate').value = m.renewalDate
      ? new Date(m.renewalDate).toISOString().slice(0,10) : '';
    CHECK_FIELDS.forEach(f => { document.getElementById('form-' + f).checked = !!m[f]; });
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }

  async function submitForm(e) {
    e.preventDefault();
    const id = document.getElementById('form-id').value;
    const body = {};
    TEXT_FIELDS.forEach(f => { body[f] = document.getElementById('form-' + f).value; });
    body.emailAddress = document.getElementById('form-emailAddress').value;
    body.renewalDate  = document.getElementById('form-renewalDate').value || null;
    CHECK_FIELDS.forEach(f => { body[f] = document.getElementById('form-' + f).checked; });

    const url    = id ? `/api/members/${id}` : '/api/members';
    const method = id ? 'PATCH' : 'POST';
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) { const err = await res.json(); alert(err.error); return; }
    closeModal();
    loadStats();
    loadMembers();
  }

  async function deleteMember(id, name) {
    if (!confirm(`Delete member "${name}"?`)) return;
    await fetch(`/api/members/${id}`, { method: 'DELETE' });
    loadStats();
    loadMembers();
  }

  updateSortHeaders();
  loadStats();
  loadMembers();
  // Load satellite group nav dropdown
  fetch('/api/satellite-groups/nav-list').then(r=>r.json()).then(groups=>{
    document.getElementById('sat-nav').innerHTML = groups.map(g =>
      `<a href="/admin/satellite-group/${g._id}">${esc(g.groupName)}</a>`
    ).join('');
  });

  // ── Notes popup ────────────────────────────────────────────────────────────
  let notesMemberId = null;

  let notesHasNotes = false;

  async function openNotes(memberId, name) {
    notesMemberId = memberId;
    notesHasNotes = false;
    document.getElementById('notes-title').textContent = `Notes — ${name}`;
    document.getElementById('note-input').value = '';
    await refreshNotes();
    document.getElementById('notes-backdrop').classList.add('open');
  }

  function closeNotes() {
    document.getElementById('notes-backdrop').classList.remove('open');
    // Update the button label based on whether notes exist
    const btn = document.getElementById('notes-btn-' + notesMemberId);
    if (btn) btn.textContent = notesHasNotes ? 'Notes' : 'Add Note';
    notesMemberId = null;
  }

  async function refreshNotes() {
    const res = await fetch(`/api/members/${notesMemberId}/notes`);
    const data = await res.json();
    notesHasNotes = data.notes.length > 0;
    const list = document.getElementById('notes-list');
    if (!data.notes.length) {
      list.innerHTML = '<p style="color:#999;font-size:.88rem">No notes yet.</p>';
      return;
    }
    list.innerHTML = data.notes.map(n => `
      <div class="note-item">
        <button class="note-del" onclick="deleteNote('${n._id}')">&times; delete</button>
        <div class="note-meta">${new Date(n.createdAt).toLocaleString()}</div>
        <div class="note-text">${esc(n.text)}</div>
      </div>
    `).join('');
  }

  async function addNote() {
    const text = document.getElementById('note-input').value.trim();
    if (!text) return;
    await fetch(`/api/members/${notesMemberId}/notes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    document.getElementById('note-input').value = '';
    await refreshNotes();
  }

  async function deleteNote(noteId) {
    if (!confirm('Delete this note?')) return;
    await fetch(`/api/members/${notesMemberId}/notes/${noteId}`, { method: 'DELETE' });
    await refreshNotes();
  }

  // ── Theme toggle ───────────────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('iba-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
  }
  (function initTheme() {
    const saved = localStorage.getItem('iba-theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';
  })();
</script>

<!-- Notes popup -->
<div class="notes-backdrop" id="notes-backdrop" onclick="if(event.target===this)closeNotes()">
  <div class="notes-panel">
    <h3 id="notes-title">Notes</h3>
    <div class="notes-list" id="notes-list"></div>
    <div class="notes-add">
      <textarea id="note-input" placeholder="Add a note…"></textarea>
      <button onclick="addNote()">Add</button>
    </div>
    <div style="text-align:right;margin-top:.75rem">
      <button class="btn-cancel" onclick="closeNotes()" style="padding:.35rem .75rem;border:none;border-radius:6px;cursor:pointer">Close</button>
    </div>
  </div>
</div>

</body>
</html>
