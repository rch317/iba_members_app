<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active Mailing List</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
<header>
  <h1>Membership Admin</h1>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
</header>
<nav>
  <a href="/admin">Members</a>
  <div class="nav-dropdown">
    <a href="/admin/satellite-groups">Satellite Groups</a>
    <div class="nav-dropdown-menu" id="sat-nav"></div>
  </div>
  <a href="/admin/mailing-active" class="active">Active Mailing List</a>
</nav>

<div class="toolbar">
  <span style="font-size:.95rem;font-weight:600;color:#444" id="member-count"></span>
  <small style="color:#666;margin-left:.5rem">Members with <strong>mailing list = on</strong> and <strong>renewal date in the future</strong></small>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="sortable" onclick="setSort('lastName')">Last Name</th>
        <th class="sortable" onclick="setSort('firstName')">First Name</th>
        <th>Address</th>
        <th class="sortable" onclick="setSort('city')">City</th>
        <th class="sortable" onclick="setSort('state')">State</th>
        <th>ZIP</th>
      </tr>
    </thead>
    <tbody id="member-tbody"></tbody>
  </table>
</div>

<script>
  let sortField = 'lastName';
  let sortDir   = 1;
  let members   = [];

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setSort(field) {
    if (sortField === field) { sortDir = sortDir === 1 ? -1 : 1; }
    else { sortField = field; sortDir = 1; }
    updateSortHeaders();
    renderTable();
  }

  function updateSortHeaders() {
    document.querySelectorAll('th.sortable').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
      const field = th.getAttribute('onclick').replace("setSort('","").replace("')","");
      if (field === sortField) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    });
  }

  function renderTable() {
    const sorted = [...members].sort((a, b) => {
      const av = String(a[sortField] ?? '').toLowerCase();
      const bv = String(b[sortField] ?? '').toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });

    document.getElementById('member-tbody').innerHTML = sorted.map(m => `
      <tr>
        <td>${esc(m.lastName)}</td>
        <td>${esc(m.firstName)}</td>
        <td>${esc(m.addressLine1)}${m.addressLine2 ? '<br><small>'+esc(m.addressLine2)+'</small>' : ''}</td>
        <td>${esc(m.city)}</td>
        <td>${esc(m.state)}</td>
        <td>${esc(m.postalZip)}</td>
      </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#999;padding:1.5rem">No active mailing list members found</td></tr>';
  }

  async function loadMembers() {
    const res  = await fetch('/api/members/mailing-active');
    const data = await res.json();
    members = data.members;
    document.getElementById('member-count').textContent = `${data.total} member${data.total !== 1 ? 's' : ''}`;
    updateSortHeaders();
    renderTable();
  }

  loadMembers();
  // Load satellite group nav dropdown
  fetch('/api/satellite-groups/nav-list').then(r=>r.json()).then(groups=>{
    document.getElementById('sat-nav').innerHTML = groups.map(g =>
      `<a href="/admin/satellite-group/${g._id}">${esc(g.groupName)}</a>`
    ).join('');
  });

  /* ── Theme toggle ─────────────────────────── */
  function toggleTheme() {
    const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
  }
  (function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', saved);
    document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';
  })();
</script>
</body>
</html>
