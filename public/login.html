<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBA Membership — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 2.5rem 2rem; width: 340px; text-align: center; }
    .logo { background: #1a1a2e; color: #fff; border-radius: 8px; padding: .6rem 1.2rem; display: inline-block; font-weight: 700; font-size: 1.1rem; letter-spacing: .04em; margin-bottom: 1.5rem; }
    h1 { font-size: 1.2rem; color: #1a1a2e; margin-bottom: .5rem; }
    p  { font-size: .88rem; color: #666; margin-bottom: 2rem; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: .75rem;
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      padding: .75rem 1.25rem; width: 100%; font-size: .95rem; font-weight: 500;
      color: #333; cursor: pointer; text-decoration: none;
      transition: background .15s, box-shadow .15s;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .btn-google svg { flex-shrink: 0; }
    .error { margin-bottom: 1.25rem; padding: .6rem 1rem; background: #fdecea; border: 1px solid #f5c6c2; border-radius: 6px; color: #c62828; font-size: .85rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">IBA</div>
  <h1>Membership Admin</h1>
  <p>Sign in with your authorized Google account to continue.</p>

  <div id="error-box" class="error" style="display:none"></div>

  <a href="/auth/google" class="btn-google">
    <!-- Google "G" logo -->
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'access_denied') {
    const box = document.getElementById('error-box');
    box.textContent = 'Access denied. Your Google account is not authorized. Contact an administrator.';
    box.style.display = 'block';
  }
</script>
</body>
</html>
